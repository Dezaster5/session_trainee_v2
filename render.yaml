services:
  - type: web
    name: exam-forge-backend
    runtime: python
    plan: free
    buildCommand: cd backend && bash build.sh
    startCommand: cd backend && bash start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: BASE_QUESTIONS_DIR
        value: /opt/render/project/src/base
      - key: TIME_ZONE
        value: Asia/Almaty
      - key: DB_SSL_REQUIRE
        value: "1"
      - key: SECURE_SSL_REDIRECT
        value: "1"
